<script>

/* GLOBAL USER */
let user = null;

/* LOGIN FUNCTION */
function login(){

const usernameInput = document.getElementById("username");

if(!usernameInput){
alert("Login input not found");
return;
}

const name = usernameInput.value.trim();

if(name === ""){
alert("Please enter a username");
return;
}

user = name;

/* SAVE USER */
localStorage.setItem("complexityUser", user);

/* HIDE LOGIN SCREEN */
document.getElementById("loginScreen").style.display = "none";

/* LOAD CHATS */
loadChats();

}

/* AUTO LOGIN ON PAGE LOAD */
window.onload = function(){

const savedUser = localStorage.getItem("complexityUser");

if(savedUser){

user = savedUser;

document.getElementById("loginScreen").style.display = "none";

loadChats();

}else{

document.getElementById("loginScreen").style.display = "flex";

}

};

/* LOGOUT */
function logout(){

localStorage.removeItem("complexityUser");

location.reload();

}

/* CHAT STORAGE */
let chats = [];
let currentChat = null;

/* LOAD CHATS */
function loadChats(){

if(!user) return;

const stored = localStorage.getItem("chats_" + user);

if(stored){

chats = JSON.parse(stored);

}else{

chats = [];

}

renderChats();

}

/* SAVE CHATS */
function saveChats(){

if(!user) return;

localStorage.setItem("chats_" + user, JSON.stringify(chats));

}

/* RENDER CHAT LIST */
function renderChats(){

const historyDiv = document.getElementById("history");

if(!historyDiv) return;

historyDiv.innerHTML = "";

chats.forEach((chatData,index)=>{

const div = document.createElement("div");

div.className = "chatItem";

div.innerText = "Chat " + (index+1);

div.onclick = function(){

loadChat(index);

};

historyDiv.appendChild(div);

});

}

/* LOAD CHAT */
function loadChat(index){

currentChat = index;

const chatDiv = document.getElementById("chat");

chatDiv.innerHTML = "";

chats[index].forEach(msg=>{

addMessage(msg.text,msg.type,false);

});

}

/* NEW CHAT */
function newChat(){

const newChatArr = [];

chats.push(newChatArr);

currentChat = chats.length - 1;

saveChats();

renderChats();

document.getElementById("chat").innerHTML = "";

}

/* ADD MESSAGE */
function addMessage(text,type,save=true){

const chatDiv = document.getElementById("chat");

const div = document.createElement("div");

div.className = "message " + type;

div.innerText = text;

chatDiv.appendChild(div);

chatDiv.scrollTop = chatDiv.scrollHeight;

if(save && currentChat !== null){

chats[currentChat].push({text,type});

saveChats();

}

return div;

}

/* SEND MESSAGE */
function send(){

const input = document.getElementById("input");

const text = input.value.trim();

if(text === "") return;

if(currentChat === null){

newChat();

}

addMessage(text,"user");

input.value = "";

/* thinking animation */
const typing = document.createElement("div");

typing.className = "typing";

typing.innerHTML =
"<span class='dot'></span><span class='dot'></span><span class='dot'></span>";

document.getElementById("chat").appendChild(typing);

/* reply */
setTimeout(()=>{

typing.remove();

const reply = getReply(text);

const botDiv = addMessage("", "bot");

typeText(botDiv, reply);

},800);

}

/* TYPE EFFECT */
function typeText(el,text){

let i = 0;

const interval = setInterval(()=>{

el.innerText += text[i];

i++;

if(i >= text.length){

clearInterval(interval);

}

},15);

}

/* AI REPLIES */
function getReply(text){

const qa = {

"hello":"Hello. Welcome to Complexity AI by Dean Baksh.",
"what is google":"Google is one of the most advanced technology companies in the world.",
"what is ai":"Artificial intelligence enables machines to simulate intelligent behaviour."

};

return qa[text.toLowerCase()] ||
"I understand your question. Complexity AI is designed to provide intelligent and professional assistance.";

}

</script>
