<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Complexity AI by Dean</title>

<style>

/* CHATGPT STYLE COLORS */

:root{
--bg:#343541;
--sidebar:#202123;
--bot:#444654;
--user:#10A37F;
--text:#ECECF1;
}

.light{
--bg:#FFFFFF;
--sidebar:#F7F7F8;
--bot:#EEEEEE;
--user:#007AFF;
--text:#111;
}

/* BODY */

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

/* LOGIN */

#loginScreen{
position:fixed;
width:100%;
height:100%;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#loginScreen input{
padding:12px;
margin:5px;
width:220px;
}

#loginScreen button{
padding:12px;
width:220px;
background:#10A37F;
border:none;
color:white;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:var(--sidebar);
display:flex;
flex-direction:column;
}

.logo{
padding:15px;
font-weight:bold;
border-bottom:1px solid #555;
}

.chatBtn{
padding:12px;
cursor:pointer;
border-bottom:1px solid #333;
}

.chatBtn:hover{
background:#2A2B32;
}

.sidebar button{
margin:5px;
padding:10px;
border:none;
background:#10A37F;
color:white;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
}

.message{
padding:15px;
white-space:pre-wrap;
}

.user{
background:var(--user);
}

.bot{
background:var(--bot);
}

/* INPUT */

.inputArea{
display:flex;
padding:10px;
background:var(--sidebar);
}

#input{
flex:1;
padding:12px;
font-size:16px;
}

.sendBtn{
padding:12px;
background:#10A37F;
color:white;
border:none;
cursor:pointer;
}

/* THINKING DOTS */

.typing{
padding:10px;
}

.dot{
height:6px;
width:6px;
margin:3px;
background:white;
border-radius:50%;
display:inline-block;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Complexity AI by Dean</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Complexity AI by Dean</div>

<div class="chatBtn" onclick="switchChat(0)">Chat 1</div>
<div class="chatBtn" onclick="switchChat(1)">Chat 2</div>
<div class="chatBtn" onclick="switchChat(2)">Chat 3</div>

<button onclick="deleteChat()">Delete</button>
<button onclick="toggleTheme()">Light / Dark</button>

</div>

<!-- MAIN -->

<div class="main">

<div id="chat"></div>

<div class="inputArea">

<input id="input" placeholder="Send message">

<button class="sendBtn" onclick="send()">Send</button>

</div>

</div>

<script>

/* LOGIN */

let currentUser=null;

function login(){

let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();

if(user==""||pass==""){
alert("Enter login");
return;
}

currentUser=user;

localStorage.setItem("complexityUser",user);

document.getElementById("loginScreen").style.display="none";

loadMemory();
render();

}

/* AUTO LOGIN */

window.onload=function(){

let saved=localStorage.getItem("complexityUser");

if(saved){

currentUser=saved;

document.getElementById("loginScreen").style.display="none";

loadMemory();
render();

}

};

/* MEMORY */

let chats=[[],[],[]];
let currentChat=0;

function saveMemory(){

localStorage.setItem(
"complexityMemory_"+currentUser,
JSON.stringify(chats)
);

}

function loadMemory(){

let data=localStorage.getItem(
"complexityMemory_"+currentUser
);

if(data) chats=JSON.parse(data);

}

/* SWITCH CHAT */

function switchChat(id){

currentChat=id;
render();

}

/* RENDER */

function render(){

chat.innerHTML="";

chats[currentChat].forEach(m=>{

addMessage(m.text,m.type,false);

});

}

/* ADD MESSAGE */

function addMessage(text,type,save=true){

let div=document.createElement("div");

div.className="message "+type;

div.textContent=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(save){

chats[currentChat].push({text,type});

saveMemory();

}

return div;

}

/* THINKING */

function thinking(){

let div=document.createElement("div");

div.className="message bot";

div.innerHTML=
'<div class="typing">'+
'<span class="dot"></span>'+
'<span class="dot"></span>'+
'<span class="dot"></span>'+
'</div>';

chat.appendChild(div);

return div;

}

/* TYPE */

function type(el,text){

let i=0;

let interval=setInterval(()=>{

el.textContent+=text[i];

i++;

if(i>=text.length) clearInterval(interval);

},20);

}

/* PRECODED ANSWERS */

function getReply(q){

q=q.toLowerCase();

const answers={

"what is google":
"Google is a global technology company specializing in search, artificial intelligence, and online services.",

"default":
"Thank you for your question if you dont mind could you expand on that ."

};

return answers[q]||answers["default"];

}

/* SEND */

function send(){

let input=document.getElementById("input");

let text=input.value.trim();

if(text=="") return;

addMessage(text,"user");

input.value="";

let t=thinking();

setTimeout(()=>{

t.remove();

let reply=getReply(text);

let bot=addMessage("", "bot");

type(bot,reply);

},700);

}

/* DELETE */

function deleteChat(){

chats[currentChat]=[];

render();

saveMemory();

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light");

}

</script>

</body>
</html>
