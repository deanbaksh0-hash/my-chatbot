<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complexity AI by Dean</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--text:white;
--user:#2563eb;
--bot:#1f2937;
}

.light{
--bg:#f3f4f6;
--panel:#ffffff;
--text:#111;
--user:#2563eb;
--bot:#e5e7eb;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

#sidebar{
width:220px;
background:var(--panel);
padding:10px;
box-sizing:border-box;
}

#logo{
width:100%;
margin-bottom:10px;
}

button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
padding:12px;
margin:10px 0;
border-radius:8px;
max-width:70%;
white-space:pre-wrap;
line-height:1.5;
}

.user{
background:var(--user);
margin-left:auto;
}

.bot{
background:var(--bot);
}

.typing{
display:inline-block;
padding:10px;
background:var(--bot);
border-radius:8px;
}

.dot{
display:inline-block;
width:6px;
height:6px;
margin:3px;
background:white;
border-radius:50%;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
0%{opacity:0.2;}
20%{opacity:1;}
100%{opacity:0.2;}
}

#inputArea{
display:flex;
padding:10px;
background:var(--panel);
}

#input{
flex:1;
padding:10px;
}

#loginScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
<h2>Login to Complexity AI</h2>
<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
<img id="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA" alt="Logo">

<button onclick="newChat()">+ New Chat</button>
<button onclick="switchChat(0)">Chat 1</button>
<button onclick="switchChat(1)">Chat 2</button>
<button onclick="switchChat(2)">Chat 3</button>

<button onclick="exportChat()">Export</button>
<button onclick="deleteChat()">Delete</button>
<button onclick="toggleTheme()">Dark/Light</button>
</div>

<!-- MAIN -->
<div id="main">
<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask something..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">Send</button>
</div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || [[],[],[]];
let currentChat = 0;

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u && p){
localStorage.setItem("loggedIn","true");
document.getElementById("loginScreen").classList.add("hidden");
}else{
alert("Enter username and password");
}
}

if(localStorage.getItem("loggedIn")==="true"){
document.getElementById("loginScreen").classList.add("hidden");
}

/* SAVE */
function save(){
localStorage.setItem("chats",JSON.stringify(chats));
}

/* SWITCH CHAT */
function switchChat(id){
currentChat=id;
render();
}

/* NEW CHAT */
function newChat(){
chats.push([]);
currentChat=chats.length-1;
save();
render();
}

/* DELETE CHAT */
function deleteChat(){
chats[currentChat]=[];
save();
render();
}

/* EXPORT */
function exportChat(){
let text=chats[currentChat].join("\n\n");
let blob=new Blob([text]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="chat.txt";
a.click();
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
}

/* RENDER */
function render(){
let chat=document.getElementById("chat");
chat.innerHTML="";
chats[currentChat].forEach(m=>{
let div=document.createElement("div");
div.className="msg "+(m.role);
div.textContent=m.text;
chat.appendChild(div);
});
}

/* TYPING DOTS */
function typingDots(){
let div=document.createElement("div");
div.className="typing";
div.innerHTML="<span class='dot'></span><span class='dot'></span><span class='dot'></span>";
return div;
}

/* FAKE AI RESPONSES */
function getResponse(q){

const answers={
"what is google":"Google is a global technology company specializing in internet services, search engines, and artificial intelligence.",

"who made you":"I was created by Dean as part of Complexity AI.",

"hello":"Hello. How can I assist you today?",

"default":"That is an excellent question. Complexity AI provides intelligent, professional-grade responses designed to assist you effectively."
};

return answers[q.toLowerCase()] || answers["default"];
}

/* SEND */
function send(){

let input=document.getElementById("input");
let text=input.value.trim();

if(!text)return;

chats[currentChat].push({role:"user",text:text});
render();

input.value="";

let chat=document.getElementById("chat");
let dots=typingDots();
chat.appendChild(dots);

setTimeout(()=>{

dots.remove();

let response=getResponse(text);

chats[currentChat].push({role:"bot",text:response});
save();
render();

},1000);
}

/* LOAD */
render();
</script>

</body>
</html>
