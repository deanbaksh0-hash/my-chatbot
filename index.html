<!DOCTYPE html>
<html>
<head>
<title>Complexity AI by Dean Baksh</title>

<style>

/* CHATGPT STYLE DESIGN */

body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:#202123;
padding:10px;
overflow-y:auto;
}

#sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#10a37f;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

#history div{
padding:10px;
margin:5px 0;
background:#2a2b32;
cursor:pointer;
border-radius:5px;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

/* MESSAGES */

.message{
max-width:70%;
padding:12px;
margin:10px;
border-radius:8px;
animation:fadeIn 0.3s;
}

.user{
background:#10a37f;
margin-left:auto;
}

.bot{
background:#444654;
margin-right:auto;
}

/* INPUT */

#inputArea{
display:flex;
padding:15px;
background:#40414f;
}

#input{
flex:1;
padding:10px;
font-size:16px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
margin-left:10px;
background:#10a37f;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>
<body>


<!-- SIDEBAR -->

<div id="sidebar">

<button onclick="newChat()">+ New Chat</button>

<div id="history"></div>

</div>


<!-- MAIN -->

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input id="input" placeholder="Message Complexity AI..." onkeypress="if(event.key==='Enter')send()">

<button onclick="send()">Send</button>

/* SIDEBAR */

function updateHistory(){

let historyDiv = document.getElementById("history");

historyDiv.innerHTML="";

chats.forEach((chat,index)=>{

let div=document.createElement("div");

div.innerText="Chat "+(index+1);

div.onclick=()=>loadChat(index);

historyDiv.appendChild(div);

});

}


/* LOAD CHAT */

function loadChat(index){

document.getElementById("chat").innerHTML="";

currentChat=chats[index];

currentChat.forEach(msg=>{

addMessage(msg.text,msg.type,false);

});

}


/* SAVE CHAT */

function saveChat(){

if(currentChat.length>0){

chats.push(currentChat);

localStorage.setItem("complexity_chats",JSON.stringify(chats));

updateHistory();

}

}


/* NEW CHAT */

function newChat(){

saveChat();

currentChat=[];

document.getElementById("chat").innerHTML="";

addMessage("New chat started.","bot",false);

}


/* TYPING EFFECT */

function typeText(div,text){

div.innerHTML="";

let i=0;

function type(){

if(i<text.length){

div.innerHTML+=text.charAt(i);

i++;

setTimeout(type,15);

}

}

type();

}


/* ADD MESSAGE */

function addMessage(text,type,save=true){

let chat=document.getElementById("chat");

let div=document.createElement("div");

div.className="message "+type;

div.innerHTML=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(save)currentChat.push({text,type});

return div;

}


/* SEND */

function send(){

let input=document.getElementById("input");

let text=input.value.toLowerCase().trim();

if(!text)return;

addMessage(text,"user");

input.value="";

let typing=addMessage("Typing...","bot",false);

setTimeout(()=>{

let reply=knowledgeBase[text] || "I understand your message. However, that question is not yet in my current knowledge base.";

typeText(typing,reply);

currentChat.push({text:reply,type:"bot"});

},500);

}


/* INIT */

updateHistory();

addMessage("Hello. I am Complexity AI by Dean Baksh. How can I help you?","bot",false);

</script>
