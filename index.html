:root{

--sidebar:#202123;
--bot:#444654;
--user:#10A37F;
--text:#ECECF1;
--input:#40414F;

.light{

--text:#111;

color:var(--text);

/* ===== LOGIN ===== */

position:fixed;

height:100%;
background:var(--bg);

align-items:center;
flex-direction:column;

}

}

padding:12px;

background:var(--user);

cursor:pointer;
}

flex-direction:column;
}

.logo{
padding:15px;
font-size:18px;
font-weight:bold;
border-bottom:1px solid #555;
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:32px;
height:32px;
}

.chatBtn{
padding:12px;
cursor:pointer;
border-bottom:1px solid #333;
}

.chatBtn:hover{
background:#2A2B32;
}

.sidebar button{
margin:5px;
padding:10px;
border:none;
background:var(--user);
color:white;
cursor:pointer;
}

/* ===== MAIN ===== */

flex:1;
display:flex;
flex-direction:column;
}

/* ===== CHAT ===== */

flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
padding:12px;
margin:8px;
border-radius:8px;
max-width:70%;

}

.user{
background:var(--user);

}

.bot{
background:var(--bot);
}

/* ===== INPUT ===== */

.inputArea{
display:flex;
padding:10px;
background:var(--input);
}

#input{
flex:1;
padding:12px;
font-size:16px;
}

.sendBtn{
padding:12px;
background:var(--user);
border:none;
color:white;
cursor:pointer;
}

/* ===== THINKING DOTS ===== */

.typing{
padding:10px;
}

.dot{
height:6px;
width:6px;
margin:3px;
background:white;
border-radius:50%;
display:inline-block;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}

/* ===== LOGIN ===== */

function login(){

let u=username.value.trim();
let p=password.value.trim();

if(!u || !p) return;

localStorage.setItem("complexityUser",u);

loginScreen.style.display="none";

}

/* AUTO LOGIN */

if(localStorage.getItem("complexityUser")){
loginScreen.style.display="none";
}

/* ===== MEMORY ===== */

let chats=[[],[],[]];
let current=0;

function saveMemory(){
localStorage.setItem("complexityChats",JSON.stringify(chats));
}

function loadMemory(){

let data=localStorage.getItem("complexityChats");

if(data) chats=JSON.parse(data);

}

loadMemory();

/* ===== SWITCH CHAT ===== */

function switchChat(id){

current=id;
render();

}

/* ===== RENDER ===== */

function render(){

chat.innerHTML="";

chats[current].forEach(m=>{
addMessage(m.text,m.type,false);
});

}

/* ===== ADD MESSAGE ===== */

function addMessage(text,type,save=true){

let div=document.createElement("div");

div.className="msg "+type;

div.textContent=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(save){

chats[current].push({text,type});
saveMemory();

}

return div;

}

/* ===== THINKING ===== */

function showThinking(){

let div=document.createElement("div");

div.className="msg bot";

div.innerHTML=
'<div class="typing">'+
'<span class="dot"></span>'+
'<span class="dot"></span>'+
'<span class="dot"></span>'+
'</div>';

chat.appendChild(div);

return div;

}

/* ===== TYPE ANIMATION ===== */

function typeText(el,text){

let i=0;

let interval=setInterval(()=>{

el.textContent+=text[i];

i++;

if(i>=text.length) clearInterval(interval);

},15);

}

function getReply(q){

q=q.toLowerCase();

for(let key in knowledge){

if(q.includes(key)) return knowledge[key];

}

return "I understand your message. I will assist based on my programmed intelligence.";

}

/* ===== SEND ===== */

function send(){

let text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

let thinking=showThinking();

setTimeout(()=>{

thinking.remove();

let reply=getReply(text);

let bot=addMessage("","bot");

typeText(bot,reply);

},700);

}

/* ===== DELETE ===== */

function deleteChat(){

chats[current]=[];

render();

saveMemory();

}

/* ===== EXPORT ===== */

function exportChat(){

let text=chats[current].map(m=>m.type+": "+m.text).join("\n");

let blob=new Blob([text]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="chat.txt";

a.click();

}
