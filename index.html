:root{

background:var(--bg);
color:var(--text);

overflow:hidden;

/* ===== SIDEBAR ===== */

#sidebar{
width:260px;
background:var(--sidebar);
display:flex;

border-right:1px solid var(--border);

#logo{
padding:16px;

}

}

#chatList{
flex:1;
overflow-y:auto;
padding:10px;
}

.chatItem{
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:5px;
color:#ddd;
}

.chatItem:hover{
background:#2a2b32;
}

.chatItem.active{
background:#343541;
}

/* ===== MAIN ===== */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:14px;
border-bottom:1px solid var(--border);
font-weight:600;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
display:flex;
padding:20px;
border-bottom:1px solid #444;
white-space:pre-wrap;
line-height:1.6;
}

.message.user{
background:var(--chat);
}

.message.bot{
background:var(--bot);
}

.avatar{
width:30px;
height:30px;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:15px;
}

.user .avatar{
background:var(--user);
}

.bot .avatar{
background:#888;
}

.text{
flex:1;
}

/* ===== INPUT ===== */

#inputArea{
padding:15px;
border-top:1px solid var(--border);
background:#40414f;
}

#inputBox{
display:flex;
background:#40414f;
border:1px solid var(--border);
border-radius:8px;
padding:10px;
}

#input{
flex:1;
background:none;
border:none;
color:white;
font-size:16px;
outline:none;
}

#send{
background:var(--user);
border:none;
color:white;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

/* ===== THINKING DOTS ===== */

.thinking{
display:inline-block;
}

.dot{
display:inline-block;
width:6px;
height:6px;
margin:3px;
background:white;
border-radius:50%;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
0%{opacity:0.2;}
20%{opacity:1;}
100%{opacity:0.2;}
}

/* SCROLLBAR */
::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-thumb{
background:#555;
border-radius:4px;
}

</style>

function save(){

localStorage.setItem("complexityChats",JSON.stringify(chats));

}

function newChat(){

chats.push([]);

currentChat=chats.length-1;

save();

renderChats();

renderMessages();

}

function renderChats(){

chatList.innerHTML="";

chats.forEach((c,i)=>{

let div=document.createElement("div");

div.className="chatItem"+(i===currentChat?" active":"");

div.innerText="Chat "+(i+1);

div.onclick=()=>{

currentChat=i;

renderChats();

renderMessages();

};

chatList.appendChild(div);

});

}

function renderMessages(){

chat.innerHTML="";

if(currentChat==null)return;

chats[currentChat].forEach(m=>{

createMessage(m.text,m.type,false);

});

}

function createMessage(text,type,saveMsg=true){

let msg=document.createElement("div");

msg.className="message "+type;

let avatar=document.createElement("div");

avatar.className="avatar";

avatar.innerText=type==="user"?"U":"AI";

let content=document.createElement("div");

content.className="text";

content.innerText=text;

msg.appendChild(avatar);

msg.appendChild(content);

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;

if(saveMsg){

chats[currentChat].push({text,type});

save();

}

return content;

}

function thinking(){

let msg=document.createElement("div");

msg.className="message bot";

let avatar=document.createElement("div");

avatar.className="avatar";

avatar.innerText="AI";

let content=document.createElement("div");

content.className="text";

content.innerHTML=`<div class="thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;

msg.appendChild(avatar);

msg.appendChild(content);

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;

return content;

}

function typeText(el,text){

el.innerHTML="";

let i=0;

let interval=setInterval(()=>{

el.innerHTML+=text[i];

i++;

if(i>=text.length)clearInterval(interval);

},15);

}

function send(){

let text=input.value.trim();

if(!text)return;

if(currentChat==null)newChat();

createMessage(text,"user");

input.value="";

let think=thinking();

let reply=qa[text.toLowerCase()]||

"I understand your request. Complexity AI will provide a professional response.";

let parent=think.parentElement;

parent.remove();

let msg=createMessage("","bot");

typeText(msg,reply);

chats[currentChat].push({text:reply,type:"bot"});

save();

},700);

}
