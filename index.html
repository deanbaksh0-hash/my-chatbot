<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Complexity AI by Dean Baksh</title>

<style>

/* THEMES */

body.dark{
--bg:#343541;
--panel:#202123;
--bot:#444654;
--user:#10a37f;
--text:white;
}

body.light{
--bg:#f7f7f8;
--panel:#ffffff;
--bot:#e5e5e7;
--user:#007aff;
--text:black;
}

/* BASE */

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Arial;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:var(--panel);
padding:10px;
overflow-y:auto;
}

.chatItem{
background:var(--bot);
padding:8px;
margin:5px 0;
border-radius:6px;
font-size:14px;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

#header{
display:flex;
align-items:center;
gap:10px;
background:var(--panel);
padding:10px;
}

#logo{
width:40px;
height:40px;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
padding:10px;
margin:8px;
border-radius:8px;
max-width:70%;
}

.user{
background:var(--user);
margin-left:auto;
}

.bot{
background:var(--bot);
}

/* INPUT */

#inputArea{
display:flex;
padding:10px;
background:var(--panel);
}

#input{
flex:1;
padding:10px;
font-size:16px;
border:none;
outline:none;
}

button{
padding:10px;
margin-left:5px;
background:var(--user);
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>
</head>

<body class="dark">

<!-- SIDEBAR -->

<div id="sidebar">

<h3>Complexity AI</h3>

<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('light')">Light</button>

<h3>Memory</h3>

<div id="history"></div>

</div>

<!-- MAIN -->

<div id="main">

<div id="header">

<!-- EMBEDDED LOGO -->
<img id="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...REPLACE_WITH_FULL_BASE64_FROM_ABOVE...">

<h2>Complexity AI by Dean Baksh</h2>

</div>

<div id="chat"></div>

<div id="inputArea">

<input id="input" placeholder="Ask Complexity AI...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

/* THEME */

function setTheme(theme){
document.body.className = theme;
localStorage.setItem("theme", theme);
}

let savedTheme = localStorage.getItem("theme");
if(savedTheme) document.body.className = savedTheme;

/* MEMORY */

let memory = JSON.parse(localStorage.getItem("memory")) || [];

function saveMemory(text){
memory.push(text);
localStorage.setItem("memory", JSON.stringify(memory));
renderMemory();
}

function renderMemory(){
let history = document.getElementById("history");
history.innerHTML="";
memory.forEach(item=>{
let div=document.createElement("div");
div.className="chatItem";
div.innerText=item;
history.appendChild(div);
});
}

renderMemory();

/* QUESTIONS */

const qa={

"hello":"Hello! I'm Complexity AI by Dean Baksh. I'm a smart offline assistant ready to help you learn, solve problems, and answer questions clearly.",

"who made you":"I was created by Dean Baksh as part of the Complexity AI project.",

"what is ai":"Artificial Intelligence is technology that allows computers to simulate human intelligence and solve problems."

};

for(let i=1;i<=100;i++){
qa["question "+i]="This is intelligent response number "+i+". Complexity AI analyzes your message and responds intelligently.";
}

/* CHAT */

function addMessage(text,type){
let div=document.createElement("div");
div.className="message "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return div;
}

/* TYPING */

function typeText(el,text){
let i=0;
let interval=setInterval(()=>{
el.innerText+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},15);
}

/* SEND */

function send(){

let input=document.getElementById("input");
let text=input.value.trim();

if(!text) return;

addMessage(text,"user");

saveMemory(text);

let reply=qa[text.toLowerCase()] ||
"I understand your message. Complexity AI is designed to help intelligently.";

let bot=addMessage("","bot");

typeText(bot,reply);

input.value="";
}

input.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
