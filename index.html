<style>

/* CHATGPT STYLE THEME */

:root{
--bg:#343541;
--sidebar:#202123;
--chat:#343541;
--bot:#444654;
--user:#10a37f;
--text:#ffffff;
--border:#565869;
}

body.light{
--bg:#ffffff;
--sidebar:#f7f7f8;
--chat:#ffffff;
--bot:#f0f0f0;
--user:#007aff;
--text:#000000;
--border:#d9d9e3;
}

body{
margin:0;
font-family:system-ui,Segoe UI,Arial;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:var(--sidebar);
display:flex;
flex-direction:column;
padding:10px;
box-sizing:border-box;
}

#logoArea{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-bottom:1px solid var(--border);
}

#logo{
width:32px;
height:32px;
}

#title{
font-weight:bold;
}

.sidebarBtn{
background:none;
border:1px solid var(--border);
color:var(--text);
padding:10px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
}

.sidebarBtn:hover{
background:rgba(255,255,255,0.05);
}

#chatList{
margin-top:10px;
overflow:auto;
flex:1;
}

.chatItem{
padding:10px;
border-radius:6px;
cursor:pointer;
}

.chatItem:hover{
background:rgba(255,255,255,0.08);
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

#header{
padding:12px;
border-bottom:1px solid var(--border);
}

/* CHAT */

#chat{
flex:1;
overflow:auto;
padding:20px;
}

.message{
max-width:700px;
margin:20px auto;
padding:14px;
border-radius:8px;
animation:fadeIn .3s;
line-height:1.6;
white-space:pre-wrap;
}

.user{
background:var(--user);
}

.bot{
background:var(--bot);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;}
}

/* INPUT */

#inputArea{
display:flex;
padding:15px;
border-top:1px solid var(--border);
}

#input{
flex:1;
padding:12px;
border-radius:6px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
font-size:16px;
}

#sendBtn{
margin-left:10px;
padding:12px 20px;
background:var(--user);
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* THINKING DOTS */

.thinking{
padding:14px;
background:var(--bot);
border-radius:8px;
width:60px;
margin:20px auto;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
display:inline-block;
margin:3px;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}
}

position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

padding:12px;

/* USER */

let user=null;

function login(){

let name=username.value.trim();

if(!name)return;

user=name;

localStorage.setItem("user",name);

login.style.display="none";

loadChats();

}

window.onload=function(){

let saved=localStorage.getItem("user");

if(saved){

user=saved;

login.style.display="none";

loadChats();

}

};

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light");

}

/* CHAT STORAGE */

let chats=[];
let currentChat=0;

function loadChats(){

chats=JSON.parse(localStorage.getItem("chats_"+user))||[[]];

renderChatList();

loadChat(0);

}

function saveChats(){

localStorage.setItem("chats_"+user,JSON.stringify(chats));

}

function renderChatList(){

chatList.innerHTML="";

chats.forEach((c,i)=>{

let div=document.createElement("div");

div.className="chatItem";

div.innerText="Chat "+(i+1);

div.onclick=()=>loadChat(i);

chatList.appendChild(div);

});

}

function loadChat(i){

currentChat=i;

chat.innerHTML="";

chats[i].forEach(m=>addMessage(m.text,m.type,false));

}

function newChat(){

chats.push([]);

saveChats();

renderChatList();

loadChat(chats.length-1);

}

function deleteChat(){

chats.splice(currentChat,1);

if(chats.length===0) chats=[[]];

saveChats();

renderChatList();

loadChat(0);

}

function exportChat(){

let text=chats[currentChat]
.map(m=>m.type+": "+m.text)
.join("\n\n");

let blob=new Blob([text]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="chat.txt";

a.click();

}

/* MESSAGE */

function addMessage(text,type,save=true){

let div=document.createElement("div");

div.className="message "+type;

chat.appendChild(div);

typeText(div,text);

chat.scrollTop=chat.scrollHeight;

if(save){

chats[currentChat].push({text,type});

saveChats();

}

}

/* TYPING */

function typeText(el,text){

let i=0;

function type(){

if(i<text.length){

el.textContent+=text[i];

i++;

setTimeout(type,15);

}

}

type();

}

/* THINKING */

function showThinking(){

let div=document.createElement("div");

div.className="thinking";

div.innerHTML="<span class='dot'></span><span class='dot'></span><span class='dot'></span>";

chat.appendChild(div);

return div;

}
