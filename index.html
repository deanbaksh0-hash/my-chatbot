<script>

const API_KEY = "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";

/* CHAT STORAGE */
let chats = JSON.parse(localStorage.getItem("complexity_chats") || "[]");
let currentChat = [];

/* UPDATE SIDEBAR */
function updateHistory(){

let history = document.getElementById("history");

history.innerHTML = "";

chats.forEach((chat,index)=>{

let div = document.createElement("div");

div.innerText = "Chat " + (index+1);

div.onclick = () => loadChat(index);

history.appendChild(div);

});

}

/* LOAD CHAT */
function loadChat(index){

document.getElementById("chat").innerHTML = "";

currentChat = chats[index];

currentChat.forEach(msg=>{
addMessage(msg.text,msg.type,false);
});

}

/* SAVE CHAT */
function saveChat(){

if(currentChat.length > 0){

chats.push(currentChat);

localStorage.setItem("complexity_chats",JSON.stringify(chats));

updateHistory();

}

}

/* NEW CHAT */
function newChat(){

saveChat();

currentChat = [];

document.getElementById("chat").innerHTML = "";

addMessage("New chat started.","bot",false);

}

/* SEND MESSAGE */
async function send(){

let input = document.getElementById("input");

let text = input.value.trim();

if(!text) return;

addMessage(text,"user",true);

input.value = "";

let typingDiv = addMessage("Complexity AI is typing...","bot",false);

try{

const response = await fetch(
"https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2",
{
method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
inputs:text
})

});

const data = await response.json();

let reply = data[0].generated_text;

typeReply(typingDiv, reply);

currentChat.push({text:reply,type:"bot"});

}
catch{

typingDiv.innerHTML = "Error connecting to AI.";

}

}

/* TYPE ANIMATION */
function typeReply(div,text){

div.innerHTML="";

let i=0;

function type(){

if(i < text.length){

div.innerHTML += text.charAt(i);

i++;

setTimeout(type,15);

}

}

type();

}

/* ADD MESSAGE */
function addMessage(text,type,save=true){

let chat = document.getElementById("chat");

let div = document.createElement("div");

div.className = "message " + type;

div.innerHTML = text;

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

if(save){

currentChat.push({text,type});

}

return div;

}

/* INIT */
updateHistory();

addMessage("Hello. I am COMPLEXITY AI BY DEAN. How can I help?","bot",false);

</script>
